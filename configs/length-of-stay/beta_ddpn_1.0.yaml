experiment_name: beta_ddpn_1.0
random_seed: 1998
head_type: double_poisson
dataset:
  type: tabular
  spec: data/length-of-stay/length_of_stay.npz
  input_dim: 35
training:
  accelerator: cpu
  batch_size: 128
  chkp_dir: chkp/length-of-stay
  chkp_freq: 100
  num_epochs: 100
  optimizer:
    type: adam_w
    kwargs:
      lr: 0.001
      weight_decay: 0.00001
  beta_scheduler:
    type: cosine_annealing
    kwargs:
      beta_0: 1.0
      beta_1: 1.0
      last_epoch: -1
  lr_scheduler:
    type: cosine_annealing
    kwargs:
      T_max: 100
      eta_min: 0
      last_epoch: -1
evaluation:
  num_trials: 5
  log_dir: logs/length-of-stay
